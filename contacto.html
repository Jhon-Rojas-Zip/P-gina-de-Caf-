<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffe Shop | Contactenos</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Miniver&display=swap" rel="stylesheet">

    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="nav-left">
            <i class="fa-solid fa-mug-hot nav-fa"></i>
            <span class="brand">Coffe</span>
        </div>

        <div class="nav-right">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="galeria.html">Galeria</a>
            <a href="contacto.html" class="bold">Contactenos</a>

            <a href="carrito.html" class="icon-link">
                <i class="fa-solid fa-cart-shopping nav-fa"></i>
            </a>

            <a href="login.html" class="icon-link">
                <i class="fa-solid fa-user nav-fa"></i>
            </a>
        </div>
    </nav>

    <!-- ===== CONTACT SECTION ===== -->
    <section class="contact-section">

        <h1 class="contact-title">CONTACTENOS</h1>
        <div class="contact-line"></div>

        <div class="contact-container">

            <div class="contact-left">

            <!-- ===== TARJETA INFORMACIÓN ===== -->
            <div class="contact-info-card">

                <div class="info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Calle 123 #45-67, Ciudad📍</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <span>info@coffe.com✉️</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-phone"></i>
                    <span>+57 300 123 4567📞</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <span>Lun - Vie: 8:00 AM - 8:00 PM🕗</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <span>Sábado: 9:00 AM - 6:00 PM🕘</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <span>Domingo: Cerrado🕛</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-globe"></i>
                    <span>www.coffe.com🌐</span>
                </div>

            </div>

            <div class="contact-brand-footer">
            <img src="./img/hot-beverages.png" alt="Cafe con granos volando">
            <span>El mejor café</span>
            </div>

            </div>

            <!-- ===== FORMULARIO ===== -->
            <div class="contact-form-card">

                <form class="contact-form">

                    <input type="text" placeholder="Tu nombre" required>
                    <input type="email" placeholder="Tu correo" required>
                    <textarea placeholder="Tu mensaje" rows="5" required></textarea>

                    <button type="submit" class="btn-contact">
                        Enviar mensaje
                    </button>

                </form>

            </div>

        </div>

    </section>

</body>
</html>
