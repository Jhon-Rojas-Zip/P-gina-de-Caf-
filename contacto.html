<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Google Font -->

    <!-- FontAwesome CDN -->
    <script src="https://kit.fontawesome.com/c08c5c0912.js" crossorigin="anonymous"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
    <!-- Toggle oculto -->
    <input type="checkbox" id="menu-toggle">

    <!-- Logo -->
    <div class="nav-left">
        <i class="fa-solid fa-mug-hot nav-fa"></i>
        <span class="brand">Coffe</span>
    </div>

    <!-- Botón hamburguesa -->
    <label for="menu-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <!-- Menú -->
    <div class="nav-right">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="galeria.html">Galeria</a>
        <a href="contacto.html">Contáctenos</a>

        <a href="carrito.html" class="icon-link">
            <i class="fa-solid fa-cart-shopping nav-fa"></i>
        </a>

        <a href="login.html" class="icon-link">
            <i class="fa-solid fa-user nav-fa"></i>
        </a>
    </div>
</nav>

    <!-- ===== CONTACT SECTION ===== -->
    <section class="contact-section">

        <h1 class="contact-title">CONTÁCTENOS</h1>
        <div class="contact-line"></div>

        <div class="contact-container">

            <div class="contact-left">

            <!-- ===== TARJETA INFORMACIÓN ===== -->
            <div class="contact-info-card">

                <div class="info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Calle 1ra B Sur #19A 03 AP 3, Garzón Huila 📍</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <span>rojashenasojhonedison@gmail.com ✉️</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-phone"></i>
                    <span>+57 321 947 5147 📞</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <span>Lun - Vie: 07:00 AM - 05:00 PM 🕗</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <span>Sábado: 07:00 AM - 05:00 PM🕘</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <span>Domingo: Cerrado🕛</span>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-globe"></i>
                    <span>www.coffe.com🌐</span>
                </div>

            </div>

            <div class="contact-brand-footer">
                <span>El mejor café</span>
            <img src="./img/hot-beverages.png" alt="Cafe con granos volando">
            </div>

            </div>

            <!-- ===== FORMULARIO ===== -->
            <div class="contact-form-card">

                <form class="contact-form">

                    <input type="text" placeholder="Tu nombre" required>
                    <input type="email" placeholder="Tu correo" required>
                    <textarea placeholder="Tu mensaje" rows="5" required></textarea>

                    <button type="submit" class="btn-contact">
                        Enviar mensaje
                    </button>

                </form>

            </div>

        </div>

    </section>

</body>
</html>
