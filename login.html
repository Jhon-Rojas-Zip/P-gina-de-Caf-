<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffe Shop | Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Miniver&display=swap" rel="stylesheet">

    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="nav-left">
            <i class="fa-solid fa-mug-hot nav-fa"></i>
            <span class="brand">Coffe</span>
        </div>

        <div class="nav-right">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="galeria.html">Galeria</a>
            <a href="contacto.html">Contactenos</a>

            <a href="carrito.html" class="icon-link">
                <i class="fa-solid fa-cart-shopping nav-fa"></i>
            </a>

            <a href="login.html" class="bold icon-link">
                <i class="fa-solid fa-user nav-fa"></i>
            </a>
        </div>
    </nav>

    <!-- ===== LOGIN SECTION ===== -->
    <section class="login-section">

        <div class="login-container">

            <!-- ===== TARJETA LOGIN ===== -->
            <div class="login-card">

                <div class="login-header">
                    <h2>Bienvenido de vuelta</h2>
                    <div class="login-icon">
                        <i class="fa-solid fa-circle-user"></i>
                    </div>
                    
                </div>

                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" required>
                    </div>

                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" required>
                    </div>

                    <div class="login-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            Recordarme
                        </label>

                        <a href="#" class="forgot">
                            ¿Olvidaste la contraseña?
                        </a>
                    </div>

                    <button type="submit" class="btn-login">
                        Iniciar sesión
                    </button>

                </form>

                <div class="divider">
                    <span>Continúa con</span>
                </div>

                <div class="social-buttons">

                    <button class="social-btn">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>

                    <button class="social-btn">
                        <i class="fa-brands fa-facebook-f"></i>
                        Facebook
                    </button>

                </div>


                <p class="register-text">
                    ¿No tienes una cuenta?
                    <a href="registro.html" class="register-link">
                        Regístrate aquí
                    </a>
                </p>

                <p class="security-text-login">
                    <i class="fa-solid fa-lock"></i>
                    Tus datos están protegidos con encriptación nivel empresarial
                </p>

            </div>

            <!-- ===== IMAGEN DERECHA ===== -->
            <div class="login-image">
                <img src="./img/coffee-hero-section.png" alt="Café decorativo">
            </div>

        </div>

    </section>

</body>
</html>
